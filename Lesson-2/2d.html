<!DOCTYPE html>
<html>
<head>
    <title>2d</title>
</head>
<body>
    <div class="js-container"></div>

    <!-- <srcipt src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></srcipt> -->
    <script>console.log("hello") </script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
    
   function Button({message}){
    return (
        <button>{message}</button>
    );
   }

   function Box({placeholder}){
    return(
        <input placeholder="type"/>
    );
   }
   function LoginForm(){
        return (
             <>
                <Box placeholder="password" />
                <div>
                    <input type="email" placeholder="Email" width="50"></input>
                </div>
                <div>
                    <input type="password" placeholder="password" width="50"></input>
                </div>
                <Button message="Login" />
                <Button message="Sign up" />

             </>
            );
   }
    function App(){
        return (
        <>
        <p>Hello, welcome to my website</p>
        <LoginForm />
        </>
    );
    }
            console.log("in the function")


    const container = document.querySelector('.js-container');
       const root = ReactDOM.createRoot(container)
        root.render(
            <App />
        )

    
    </script>
</body>
