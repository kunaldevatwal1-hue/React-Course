<!DOCTYPE html>
<html>
<head>
    <title>e-commerce</title>
</head>
<body>
    <div class="js-container"></div>

    <!-- <srcipt src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></srcipt> -->
    <script>console.log("hello") </script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>

    <script type="text/babel">


function ProductDetail({paragraph,price,discount,imagesrc}){
    return (
        <div>  
            <img src={imagesrc} width="150"/>
            <p>{paragraph}</p>
            
            {!discount ? <p>Price: ${price}</p> : 
            <>
            <del>Price: ${price}</del>
            <p>Discounted Price is: ${discount}</p>
            </>
        }


            <button>Add to Cart</button>
        </div>
    )
}

function App(){
    return (
        <>
            <ProductDetail
              paragraph="Cotton socks"
              price="10.90"
              discount="5.45"
              imagesrc="cotton-socks.png"
            />
            <ProductDetail
              paragraph="Tennis balls"
              price="6.00"
              imagesrc="tennis-balls.png"
            />
            <ProductDetail
              paragraph="Plain T-Shirt"
              price="7.99"
              imagesrc="plain-t-shirt.png"
            />
        </>

    );
}
        const container = document.querySelector('.js-container');
        const root=ReactDOM.createRoot(container)
        root.render(<App />)

</script>
</body>
</html>
